<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>综合习题课</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<style>
body{background: linear-gradient(160deg, #080c1f 0%, #1f375a 45%, #3e5d95 100%); padding:20px; color:#f8f9fa; min-height:100vh;}
header{background: rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15); border-radius:12px; padding:18px; box-shadow:0 10px 20px rgba(0,0,0,0.2);}
header h3{letter-spacing:1px; font-weight:700;}
#showTime{font-size:1rem; color:#d3e3ff; }
.card{padding:28px; border-radius:16px; background: rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.2); box-shadow:0 15px 26px rgba(0,0,0,0.25); backdrop-filter: blur(5px); min-height: 420px;}
.card h5{color:#fff; font-weight:700; margin-bottom:1rem;}
.form-control{background: rgba(255,255,255,0.90); border:1px solid #8ca6ff; transition: all .25s ease;}
.form-control:focus{box-shadow:0 0 0 0.2rem rgba(140, 166, 255, 0.34); border-color:#7b9bff;}
.btn{font-weight:700; letter-spacing:.5px; border-radius:50px; padding:10px 20px; border:2px solid rgba(255,255,255,0.9); background:linear-gradient(120deg, rgba(115,177,255,0.95), rgba(89,141,255,0.9)); color:#fff; transition: transform .2s ease, box-shadow .2s ease, filter .2s ease;}
.btn:hover{transform: translateY(-1px); filter:brightness(1.08); box-shadow:0 8px 15px rgba(0,0,0,0.25);}
.btn:active{transform: translateY(0); filter:brightness(1);}
.done{text-decoration:line-through; color:#a8b8d8;}
.todo-item{padding:12px 14px; border-radius:12px; border:1px solid rgba(255,255,255,0.2); cursor:pointer; display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; transition: all 0.2s ease;}
.todo-item:hover{transform: translateY(-1px); background:rgba(255,255,255,0.15); border-color:#ced9fc;}
.delBtn{border:none; background:rgba(220,53,69,0.15); color:#ffb3b9; font-weight:700; border-radius:6px; padding:2px 8px; transition:.2s;}
.delBtn:hover{background:rgba(220,53,69,0.28); color:#fff;}
#todoCount{color:#e0e8ff; font-weight:600;}
footer{color:#c8d7ff;}
</style>
</head>
<body>

<header class="text-center my-4">
  <h3>个人信息 & 待办清单</h3>
  <div id="showTime" class="mt-2 text-muted"></div>
</header>

<div class="container">
  <div class="row g-4">
    <!-- 左侧信息卡片 -->
    <div class="col-12 col-md-6">
      <div class="card">
        <h5>个人信息</h5>
        <input id="name" class="form-control my-2" placeholder="请输入姓名">
        <input id="email" class="form-control my-2" placeholder="请输入邮箱">
        <button id="saveInfo" class="btn btn-primary w-100">保存信息</button>
      </div>
    </div>

    <!-- 右侧待办清单 -->
    <div class="col-12 col-md-6">
      <div class="card">
        <h5>待办清单</h5>
        <input id="todoInput" class="form-control my-2" placeholder="输入待办内容">
        <button id="addTodo" class="btn btn-success w-100">添加</button>
        <div id="todoCount" class="mt-3 text-sm">总数：0 已完成：0</div>
        <ul id="todoList" class="list-unstyled mt-3"></ul>
      </div>
    </div>
  </div>
</div>

<footer class="text-center mt-5 text-muted">
  前端综合习题课 © 2026
</footer>

<script>
// 1. 实时时间
function showTime(){
  var d = new Date();
  var y = d.getFullYear();
  var m = (d.getMonth()+1).toString().padStart(2,'0');
  var day = d.getDate().toString().padStart(2,'0');
  var hh = d.getHours().toString().padStart(2,'0');
  var mm = d.getMinutes().toString().padStart(2,'0');
  var ss = d.getSeconds().toString().padStart(2,'0');
  var str = y + '年' + m + '月' + day + '日 ' + hh + ':' + mm + ':' + ss;
  $('#showTime').text(str);
}
showTime();
setInterval(showTime,1000);

// 2. 保存信息并验证
$('#saveInfo').click(function(){
  var nameVal = $('#name').val().trim();
  var emailVal = $('#email').val().trim();
  if(!nameVal){
    alert('请输入姓名');
    $('#name').focus();
    return;
  }
  if(!emailVal){
    alert('请输入邮箱');
    $('#email').focus();
    return;
  }
  var emailReg = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  if(!emailReg.test(emailVal)){
    alert('请输入有效邮箱地址');
    $('#email').focus();
    return;
  }
  alert('信息保存成功！\n姓名：' + nameVal + '\n邮箱：' + emailVal);
});

// 6. 统计数量
function updateCount(){
  var total = $('#todoList .todo-item').length;
  var completed = $('#todoList .todo-item.done').length;
  $('#todoCount').text('总数：' + total + ' 已完成：' + completed);
}

// 3. 添加待办
$('#addTodo').click(function(){
  var todoText = $('#todoInput').val().trim();
  if(!todoText){
    alert('请输入待办内容');
    $('#todoInput').focus();
    return;
  }
  var li = $('<li class="todo-item"></li>');
  var textSpan = $('<span class="todo-text"></span>').text(todoText);
  var delBtn = $('<button class="delBtn">删除</button>');
  li.append(textSpan).append(delBtn);
  $('#todoList').append(li);
  $('#todoInput').val('').focus();
  updateCount();
});

// 4. 标记完成/取消
$(document).on('click', '.todo-item', function(e){
  if($(e.target).hasClass('delBtn')){
    return;
  }
  $(this).toggleClass('done');
  updateCount();
});

// 5. 删除待办
$(document).on('click', '.delBtn', function(e){
  e.stopPropagation();
  $(this).closest('.todo-item').remove();
  updateCount();
});
</script>
</body>
</html>
